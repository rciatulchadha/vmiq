apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmiq-app
  namespace: vmiq-app
  labels:
    app: vmiq-app
    app.kubernetes.io/part-of: evit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmiq-app
  template:
    metadata:
      labels:
        app: vmiq-app
    spec:
      containers:
        - name: app
          image: quay.io/chadha_atul/vmiq-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vmiq-postgres-secret
                  key: DATABASE_URL
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: vmiq-azure-secret
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: vmiq-azure-secret
                  key: AZURE_OPENAI_KEY
            - name: AZURE_OPENAI_DEPLOYMENT
              valueFrom:
                secretKeyRef:
                  name: vmiq-azure-secret
                  key: AZURE_OPENAI_DEPLOYMENT
            - name: AZURE_OPENAI_API_VERSION
              valueFrom:
                secretKeyRef:
                  name: vmiq-azure-secret
                  key: AZURE_OPENAI_API_VERSION
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1536Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vmiq-app-svc
  namespace: vmiq-app
  labels:
    app: vmiq-app
spec:
  selector:
    app: vmiq-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vmiq-app
  namespace: vmiq-app
  labels:
    app: vmiq-app
  annotations:
    haproxy.router.openshift.io/timeout: "120s"
spec:
  host: vmiq.apps.hcp-plteng-controlm.rpc.ren.rogers.com
  to:
    kind: Service
    name: vmiq-app-svc
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
